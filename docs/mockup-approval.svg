<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <clipPath id="rounded"><rect width="360" height="360" rx="14" ry="14"/></clipPath>
  </defs>
  <rect width="400" height="400" fill="#111"/>
  <g transform="translate(20,20)" clip-path="url(#rounded)">
    <rect width="360" height="360" rx="14" ry="14" fill="#05080c" stroke="#444" stroke-width="2"/>
    <!-- timer -->
    <text x="14" y="26" fill="#fc8" font-family="monospace" font-size="14">approve? 8s</text>
    <!-- tool name -->
    <text x="14" y="58" fill="#cfe" font-family="monospace" font-size="24" font-weight="bold">Bash</text>
    <!-- hint text -->
    <text x="14" y="90" fill="#8fb0c0" font-family="monospace" font-size="13">
      <tspan x="14" dy="0">rm -rf /tmp/build &amp;&amp;</tspan>
      <tspan x="14" dy="20">pnpm install &amp;&amp; pnpm run</tspan>
      <tspan x="14" dy="20">build --force --no-cache</tspan>
      <tspan x="14" dy="20">then redeploy to staging</tspan>
      <tspan x="14" dy="20">with the updated config</tspan>
      <tspan x="14" dy="20">and restart services...</tspan>
    </text>
    <!-- scrollbar track + thumb -->
    <rect x="346" y="76" width="4" height="150" rx="2" fill="#1c2a33"/>
    <rect x="346" y="76" width="4" height="52" rx="2" fill="#4a7"/>
    <!-- OK button -->
    <rect x="8" y="272" width="168" height="76" rx="12" fill="#1a7a3a"/>
    <text x="92" y="318" fill="#dfffe8" font-family="monospace" font-size="26" font-weight="bold" text-anchor="middle">OK</text>
    <!-- NO button -->
    <rect x="184" y="272" width="168" height="76" rx="12" fill="#9a2a2a"/>
    <text x="268" y="318" fill="#ffe0e0" font-family="monospace" font-size="26" font-weight="bold" text-anchor="middle">NO</text>
  </g>
</svg>
