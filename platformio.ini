[env:waveshare-s3-touch-lcd-4b]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32s3_120_16_8-qio_opi
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
board_build.arduino.memory_type = qio_opi
; Override the board manifest's build.extra_flags so ARDUINO_USB_CDC_ON_BOOT is
; defined exactly ONCE. The board default is =1; passing a second -D...=0 via
; build_flags makes the from-source framework components fail under -Werror
; ("ARDUINO_USB_CDC_ON_BOOT redefined"). TEMP =0 routes app Serial to UART0/COM4
; for audio + IMU verification on this CH343 board; revert to =1 when done.
board_build.extra_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1
build_src_filter =
    +<*>
    +<buddies/>
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
; From-source framework rebuild: fixes silent audio (i2s.begin GDMA "user
; context not in internal RAM") AND the RGB-panel cache-disable reboot, using
; the proven-good GDMA/LCD flags from the 4B Brookesia ESP-IDF demo's sdkconfig.
;
; The esp_insights managed component fails to build under pioarduino 53.03.13
; (its embedded cert https_server.crt.S is never generated). Two coordinated
; mechanisms drop it: (1) custom_component_remove deletes the Insights/RainMaker/
; diagnostics/zigbee/esp-sr managed components from the Arduino idf_component.yml
; so they never build; (2) SELECTIVE_COMPILATION disables the matching Arduino
; libraries that #include those components (which would otherwise fail to
; compile). Everything we use (BLE, FS, LittleFS, Preferences, Wire, SPI,
; Network) stays enabled by default.
; This board has OCTAL (OPI) 8MB PSRAM. memory_type=qio_opi selects the right
; *precompiled* variant but does NOT propagate into a from-source build, whose
; base esp32s3 sdkconfig defaults to SPIRAM_MODE_QUAD → PSRAM init fails ("wrong
; PSRAM line mode") → RGB framebuffer alloc fails → boot loop. The pioarduino
; merge matches overrides to the base by CONFIG key, so switching this Kconfig
; choice needs BOTH the QUAD member off and the OCT member on (matches Brookesia).
custom_sdkconfig =
    CONFIG_SPIRAM_MODE_QUAD=n
    CONFIG_SPIRAM_MODE_OCT=y
    CONFIG_GDMA_ISR_IRAM_SAFE=n
    CONFIG_GDMA_CTRL_FUNC_IN_IRAM=y
    CONFIG_LCD_RGB_ISR_IRAM_SAFE=n
    CONFIG_LCD_RGB_RESTART_IN_VSYNC=n
    CONFIG_ARDUINO_SELECTIVE_COMPILATION=y
    CONFIG_ARDUINO_SELECTIVE_Insights=n
    CONFIG_ARDUINO_SELECTIVE_RainMaker=n
    CONFIG_ARDUINO_SELECTIVE_ESP_SR=n
    CONFIG_ARDUINO_SELECTIVE_Zigbee=n
    CONFIG_ARDUINO_SELECTIVE_Matter=n
    CONFIG_ARDUINO_SELECTIVE_OpenThread=n
custom_component_remove =
    espressif/esp_insights
    espressif/esp_rainmaker
    espressif/rmaker_common
    espressif/network_provisioning
    espressif/esp_diag_data_store
    espressif/esp_diagnostics
    espressif/cbor
    espressif/qrcode
    espressif/esp-sr
    espressif/esp-zboss-lib
    espressif/esp-zigbee-lib
lib_deps =
    moononournation/GFX Library for Arduino @ ^1.5.6
    lewisxhe/SensorLib @ ^0.2.6
    lewisxhe/XPowersLib @ ^0.2.4
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0
